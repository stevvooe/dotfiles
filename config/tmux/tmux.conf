# Core behavior
unbind C-b
set -g prefix C-s
bind C-s send-prefix

set -g default-terminal "tmux-256color"
set -g terminal-overrides "xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

set -g mouse on
set -g history-limit 100000
set -g focus-events on
set -g set-clipboard on
set -g extended-keys always
set -g extended-keys-format csi-u
set -g word-separators " "
set -g escape-time 10
set -g display-time 3000
set -g status-interval 5
set -g status-position top
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins/"
set -g terminal-features "xterm*:extkeys,xterm*:hyperlinks,tmux-256color:extkeys,tmux-256color:hyperlinks"

# Window and pane behavior
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"
setw -g allow-rename off

# Theme
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g popup-border-lines rounded

# Status bar
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"

# Key bindings
bind -n M-s switch-client -n
bind -n M-n next-window
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind s display-popup -E -w 64 -h 42% "~/.config/tmux/scripts/session-switch"
bind S command-prompt -p "new session" "new-session -A -s '%%'"
bind N switch-client -n
bind P switch-client -p
bind -r ^ last-window
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind f display-popup -E -w 54 -h 38% "~/.config/tmux/scripts/window-switch"
bind v split-window -h -c "#{pane_current_path}"
bind e split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

run '~/.local/share/tmux/plugins/tpm/tpm'
